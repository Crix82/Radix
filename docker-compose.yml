name: radix

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      RADIX_DOMAIN: ${RADIX_DOMAIN:-localhost}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv/www:ro
      - caddy_data:/data
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    restart: "no"
    volumes:
      - frontend_dist:/out

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-radix}:${POSTGRES_PASSWORD:-radix}@postgres:5432/${POSTGRES_DB:-radix}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      DATA_DIR: /data
    volumes:
      - ${DATA_DIR:-./data}/repository:/data/repository
      - ${DATA_DIR:-./data}/pagecache:/data/pagecache
      # Folder sources (type local/smb) must live under this mount to be visible in-container.
      - ${SOURCES_DIR:-./data/sources}:/data/sources
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker:
    build: ./backend
    restart: unless-stopped
    command: python -m worker.main
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-radix}:${POSTGRES_PASSWORD:-radix}@postgres:5432/${POSTGRES_DB:-radix}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      DATA_DIR: /data
    volumes:
      - ${DATA_DIR:-./data}/repository:/data/repository
      - ${DATA_DIR:-./data}/pagecache:/data/pagecache
      - ${SOURCES_DIR:-./data/sources}:/data/sources
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radix}
      POSTGRES_DB: ${POSTGRES_DB:-radix}
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radix} -d ${POSTGRES_DB:-radix}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-./data}/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  frontend_dist:
  caddy_data:
