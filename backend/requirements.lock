# Pinned production resolution for the api/worker image.
#
# Every dependency in pyproject.toml is an open lower bound (`>=`), so an unconstrained
# `pip install .` resolves whatever is newest on the day of the build — the image is not
# reproducible and can change under us between a verification run and a customer install.
# This file freezes the resolution that was actually verified; the Dockerfile installs it
# with --no-deps so nothing floats.
#
# Regenerate with `make lock` after changing pyproject.toml, then re-run `make licenses`.
# Provenance: pip freeze of the M6-verified image (radix-worker, built 2026-07-18).

